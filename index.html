<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <title>Clap Finder - Melody PWA</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; margin: 0; background-color: #f8f9fa; transition: background-color 0.5s;
            overflow: hidden;
        }
        .container { 
            text-align: center; background: white; padding: 2.5rem; 
            border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            z-index: 1;
        }
        #status { font-size: 1.1rem; margin-bottom: 2rem; color: #666; line-height: 1.5; }
        .btn { padding: 18px 45px; font-size: 1.1rem; font-weight: 600; border: none; border-radius: 50px; cursor: pointer; transition: all 0.3s; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .start { background-color: #4facfe; color: white; }
        .stop { background-color: #ff6b6b; color: white; display: none; }
        
        /* 커피 후원 버튼 스타일 */
        .donation-section {
            margin-top: 40px;
            opacity: 0.6;
            transition: all 0.5s;
        }
        .donation-section:hover { opacity: 1; }
        .coffee-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background-color: #fee500; /* 카카오색 */
            color: #3c1e1e;
            text-decoration: none;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: bold;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .alarm-active { background-color: #e0f7fa !important; }
        .alarm-active .donation-section { transform: scale(1.1); opacity: 1; }
    </style>
</head>
<body>

<div class="container">
    <h2>🎵 멜로디 폰 찾기</h2>
    <div id="status">박수를 두 번 연속 치면<br>아름다운 멜로디가 울립니다.</div>
    <button id="startBtn" class="btn start" onclick="initAudio()">감지 모드 켜기</button>
    <button id="stopBtn" class="btn stop" onclick="stopDetection()">중지하기</button>

    <div class="donation-section">
        <p style="font-size: 0.8rem; color: #888; margin-bottom: 8px;">폰 찾는 데 도움이 되셨나요?</p>
        <a href="https://qr.kakaopay.com/FRK8J0SAD" target="_blank" class="coffee-btn">
            ☕ 찬둥에게 커피 한 잔 선물하기
        </a>
    </div>
</div>

<script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').catch(err => console.log(err));
    }

    let audioContext, analyser, microphone, scriptProcessor;
    let lastClapTime = 0;
    let isAlarming = false;

    async function initAudio() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioContext.createAnalyser();
            microphone = audioContext.createMediaStreamSource(stream);
            scriptProcessor = audioContext.createScriptProcessor(2048, 1, 1);

            microphone.connect(analyser);
            analyser.connect(scriptProcessor);
            scriptProcessor.connect(audioContext.destination);

            scriptProcessor.onaudioprocess = processAudio;

            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('stopBtn').style.display = 'inline-block';
            document.getElementById('status').innerHTML = "박수 소리를<br>기다리고 있어요 ✨";
        } catch (err) { alert("마이크 권한을 허용해 주세요!"); }
    }

    function processAudio(e) {
        if (isAlarming) return;
        const inputData = e.inputBuffer.getChannelData(0);
        let maxVolume = 0;
        for (let i = 0; i < inputData.length; i++) { if (inputData[i] > maxVolume) maxVolume = inputData[i]; }

        if (maxVolume > 0.45) {
            const now = Date.now();
            if (now - lastClapTime > 200 && now - lastClapTime < 800) playMelody();
            lastClapTime = now;
        }
    }

    function playNote(freq, startTime, duration) {
        const osc = audioContext.createOscillator();
        const gain = audioContext.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(freq, startTime);
        gain.gain.setValueAtTime(0, startTime);
        gain.gain.linearRampToValueAtTime(0.5, startTime + 0.05);
        gain.gain.exponentialRampToValueAtTime(0.01, startTime + duration);
        osc.connect(gain); gain.connect(audioContext.destination);
        osc.start(startTime); osc.stop(startTime + duration);
    }

    function playMelody() {
        isAlarming = true;
        document.body.classList.add('alarm-active');
        document.getElementById('status').innerHTML = "🎶 여기 있어요!<br>찾아주셔서 감사합니다.";
        
        const now = audioContext.currentTime;
        playNote(523.25, now, 0.5); 
        playNote(659.25, now + 0.2, 0.5); 
        playNote(783.99, now + 0.4, 0.5); 
        playNote(1046.50, now + 0.6, 0.8);

        if (navigator.vibrate) navigator.vibrate([200, 100, 200]);

        setTimeout(() => {
            isAlarming = false;
            document.body.classList.remove('alarm-active');
            document.getElementById('status').innerHTML = "다시 박수 소리를<br>기다리고 있어요 ✨";
        }, 3000);
    }

    function stopDetection() { location.reload(); }
</script>

</body>
</html>
