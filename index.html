<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>박수로 폰 찾기 (Clap Finder)</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
            transition: background-color 0.3s;
        }
        .container {
            text-align: center;
            background: white;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        #status {
            font-size: 1.2rem;
            margin-bottom: 2rem;
            color: #555;
        }
        .btn {
            padding: 15px 40px;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
        }
        .start { background-color: #007bff; color: white; }
        .stop { background-color: #ff4757; color: white; display: none; }
        .btn:active { transform: scale(0.95); }
        
        /* 박수 감지 시 깜빡이는 효과 */
        .detecting { background-color: #ffeaa7 !important; }
        .alarm-active { background-color: #ff7675 !important; animation: blink 0.5s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <h2>👏 박수로 내 폰 찾기</h2>
    <div id="status">아래 버튼을 눌러 감지를 시작하세요</div>
    <button id="startBtn" class="btn start" onclick="initAudio()">감지 시작하기</button>
    <button id="stopBtn" class="btn stop" onclick="stopDetection()">중지하기</button>
</div>

<script>
    let audioContext;
    let analyser;
    let microphone;
    let scriptProcessor;
    let lastClapTime = 0;
    let isAlarming = false;

    async function initAudio() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioContext.createAnalyser();
            microphone = audioContext.createMediaStreamSource(stream);
            scriptProcessor = audioContext.createScriptProcessor(2048, 1, 1);

            analyser.smoothingTimeConstant = 0.3;
            analyser.fftSize = 1024;

            microphone.connect(analyser);
            analyser.connect(scriptProcessor);
            scriptProcessor.connect(audioContext.destination);

            scriptProcessor.onaudioprocess = processAudio;

            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('stopBtn').style.display = 'inline-block';
            document.getElementById('status').innerText = "박수를 기다리는 중...";
        } catch (err) {
            alert("마이크 권한이 필요합니다: " + err);
        }
    }

    function processAudio(e) {
        if (isAlarming) return;

        const inputData = e.inputBuffer.getChannelData(0);
        let maxVolume = 0;
        for (let i = 0; i < inputData.length; i++) {
            if (inputData[i] > maxVolume) maxVolume = inputData[i];
        }

        // 박수 소리 감지 임계값 (환경에 따라 0.3 ~ 0.6 조절 가능)
        if (maxVolume > 0.45) {
            const now = Date.now();
            const timeDiff = now - lastClapTime;

            // 두 번째 박수가 0.2초 ~ 0.8초 사이에 들리면 인식
            if (timeDiff > 200 && timeDiff < 800) {
                triggerAlarm();
            }
            lastClapTime = now;
        }
    }

    function triggerAlarm() {
        isAlarming = true;
        document.body.classList.add('alarm-active');
        document.getElementById('status').innerText = "🔊 찾으셨나요? 여기 있습니다!";
        
        // 1. 진동 (지원되는 기기에서)
        if (navigator.vibrate) navigator.vibrate([500, 300, 500, 300, 500]);

        // 2. 소리 (브라우저 기본 비프음)
        const osc = audioContext.createOscillator();
        const gain = audioContext.createGain();
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(880, audioContext.currentTime); // 높은 라 음
        osc.connect(gain);
        gain.connect(audioContext.destination);
        
        gain.gain.setValueAtTime(0, audioContext.currentTime);
        gain.gain.linearRampToValueAtTime(1, audioContext.currentTime + 0.1);
        
        osc.start();
        
        // 3초 후 알람 자동 중지
        setTimeout(() => {
            osc.stop();
            isAlarming = false;
            document.body.classList.remove('alarm-active');
            document.getElementById('status').innerText = "다시 박수를 기다리는 중...";
        }, 3000);
    }

    function stopDetection() {
        location.reload(); // 가장 확실한 중지 방법
    }
</script>

</body>
</html>
